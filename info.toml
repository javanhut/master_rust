nested Vecs AND on `Vec<Option<T>>` (Option is itself IntoIterator yielding
0 or 1). `.flat_map(|x| iter)` is `.map(...).flatten()` in one call: use it
when one input produces ZERO OR MORE outputs. `text.lines().flat_map(|l| l.split_whitespace())`.
"""

[[exercises]]
name = "iter8_custom"

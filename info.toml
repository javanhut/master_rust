# ===================== Chapter 7 — Iterators =================================

[[exercises]]
name = "iter1_basics"
path = "exercises/07_iterators/iter1_basics.rs"
mode = "test"
hint = """
Iterator is a trait with one required method: `fn next(&mut self) -> Option<Item>`.
A `for` loop is sugar for `loop { match it.next() { Some(x)=>..., None=>break } }`.
`xs.iter()` yields `&T`; tack `.copied()` (T: Copy) or `.cloned()` to get owned items.
The iterator binding must be `mut` because `next` mutates internal state.
"""

[[exercises]]
name = "iter2_map_filter"
path = "exercises/07_iterators/iter2_map_filter.rs"
mode = "test"
hint = """
`.map(|x| ...)` and `.filter(|x| ...)` are ADAPTERS — they return new iterators
and run NOTHING until you call a terminator (`.collect`, `.sum`, `.count`,
`.for_each`, `.fold`, ...). `filter`'s closure receives a REFERENCE to the
item, so over an `i32` stream write `|&x| ...`; over an `&i32` stream `|&&x|`.
"""

[[exercises]]
name = "iter3_fold_sum"
path = "exercises/07_iterators/iter3_fold_sum.rs"
mode = "test"
hint = """
`.sum()`, `.product()`, `.count()` are specialised reducers. `.fold(init, |acc, x| ...)`
is the general form — every reducer is a fold in disguise. Annotate the
result type (binding or turbofish) for sum/product since std can't tell which
numeric type you want. count returns `usize`.
"""

[[exercises]]
name = "iter4_collect"
path = "exercises/07_iterators/iter4_collect.rs"
mode = "test"
hint = """
`.collect()` materialises an iterator into anything implementing `FromIterator`:
`Vec<T>`, `String` (from chars or &strs), `HashMap<K,V>` (from `(K,V)` pairs),
`HashSet<T>`, ... Tell it the target via the binding type or turbofish
(`.collect::<Vec<_>>()`). Magic trick: an iterator of `Result<T,E>` collects
into `Result<Vec<T>, E>` and SHORT-CIRCUITS on the first Err.
"""

[[exercises]]
name = "iter5_zip_enumerate"
path = "exercises/07_iterators/iter5_zip_enumerate.rs"
mode = "test"
hint = """
`.enumerate()` yields `(index, item)`. `.zip(other)` pairs items 1:1 and
stops at the shorter side. `.chain(other)` concatenates. `.take(n)` /
`.skip(n)` / `.step_by(k)` crop. `(0..)` is an infinite range — make it
finite with `.take(n)`. argmax idiom: `.iter().enumerate().max_by_key(|(_, v)| **v)`.
"""

[[exercises]]
name = "iter6_find_any_all"
path = "exercises/07_iterators/iter6_find_any_all.rs"
mode = "test"
hint = """
Short-circuit terminators: `.find(|&&x| ...)` first match, `.position(...)`
its index, `.any(...)` / `.all(...)` boolean checks, `.max_by_key(|x| ...)`
biggest by key. GOTCHA: `find` and `filter` take their item by REFERENCE
(`|&&x|` over `&i32`); `any`, `all`, `position` take it BY VALUE (`|&x|`).
On empty: `any` is false, `all` is true (vacuous), max/min return None.
"""

[[exercises]]
name = "iter7_flat_map"

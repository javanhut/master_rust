mode = "test"
hint = """
Implement Iterator on your own struct: pick `type Item = ...;` then write
`fn next(&mut self) -> Option<Self::Item>`. Returning `None` once means done.
Once `next` exists, every combinator (`map`, `take`, `filter`, `sum`, `nth`, ...)
is FREE. Compute the next state into a local before overwriting fields, or
the old `a` is gone before you've used it.
"""


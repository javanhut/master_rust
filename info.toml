# master_rust — exercise manifest
# Order in this file = order the runner serves them.
# `mode` values: "compile" (default), "test", "run"

# ====================== Chapter 1 — Intro & Variables ========================

[[exercises]]
name = "intro1"
path = "exercises/01_intro/intro1.rs"
mode = "run"
hint = """
The very first exercise. Read every comment in the file before changing anything.
You only need to do TWO things:
  1. Find the `// I AM NOT DONE` line near the top and DELETE it.
  2. Look at the body of `main` — there is one ??? you need to replace.
The `println!` macro takes a string literal as its first argument.
"""

[[exercises]]
name = "intro2"
path = "exercises/01_intro/intro2_print.rs"
mode = "run"
hint = """
println! formatting placeholders:
  {}    — uses the type's Display impl (human-friendly).
  {:?}  — uses Debug (programmer-friendly, works on more types).
  {:#?} — pretty-printed Debug (multi-line).
You can pass arguments by position ({0}, {1}) or by name ({name}).
"""

[[exercises]]
name = "intro3"
path = "exercises/01_intro/intro3_variables.rs"
mode = "test"
hint = """
`let x = 10;` declares an *immutable* binding. The type is inferred.
You can't assign to it again — Rust will refuse to compile.
"""

[[exercises]]
name = "intro4"
path = "exercises/01_intro/intro4_mutability.rs"
mode = "test"
hint = """
To make a binding mutable, write `let mut x = 0;`.
Mutability in Rust is a *property of the binding*, not the type.
"""

[[exercises]]
name = "intro5"
path = "exercises/01_intro/intro5_shadowing.rs"
mode = "test"
hint = """
Shadowing means re-declaring a name with a *new* `let`.
The new binding can have a different type. This is different from `mut`,
which only changes the value but keeps the same type.
"""

[[exercises]]
name = "intro6"
path = "exercises/01_intro/intro6_constants.rs"
mode = "test"
hint = """
`const` requires:
  - SCREAMING_SNAKE_CASE by convention,
  - an explicit type annotation (the compiler will not infer it),
  - a value that can be computed at compile time.
"""

[[exercises]]
name = "intro7"
path = "exercises/01_intro/intro7_types.rs"
mode = "test"
hint = """
When the compiler can't infer a type, you must annotate it.
`"42".parse()` is the classic case — `parse` works for many types, so you
must say which: `let n: i32 = "42".parse().unwrap();`
or                `let n = "42".parse::<i32>().unwrap();`  (turbofish).
"""

[[exercises]]
name = "intro_quiz"
path = "exercises/01_intro/intro_quiz.rs"
mode = "test"
hint = """
This quiz combines everything from chapter 1. Go slowly — pick the right
tool for each blank: `let`, `let mut`, shadowing, or `const`.
"""


Capstone: `trait Shape { fn area(&self) -> f64; }` plus Circle (πr²),
Rectangle (w·h), Triangle (½·b·h). Two summing functions:
  total_area_static<S: Shape>(&[S])           — homogeneous, static dispatch
  total_area_dyn(&[Box<dyn Shape>])           — heterogeneous, dynamic
Both bodies are the same loop; the signatures encode the dispatch style.
Use `std::f64::consts::PI`. Areas are sums of `s.area()` over the slice.
"""

# ====================== Chapter 12 — Modules, crates, Cargo ==================

[[exercises]]
name = "mod1_basics"
path = "exercises/12_modules/mod1_basics.rs"
mode = "test"
hint = """
A module is `mod NAME { ... }` — a named container for items. Items are
PRIVATE by default; mark `pub fn` / `pub struct` / `pub mod` to expose them.
Outside the module, reach in with the `::` path operator: `greeter::hello()`.
In a real Cargo project this same module would live at `src/greeter.rs` and
be declared with `mod greeter;` from the parent — same semantics, different
file layout. The runner here compiles a single file, so we use inline blocks.
"""

[[exercises]]
name = "mod2_paths"
path = "exercises/12_modules/mod2_paths.rs"
mode = "test"
hint = """
Three relative path keywords:
  self::    — this module
  super::   — the parent module
  crate::   — the crate root (absolute)
Nested modules give nested paths: `crate::a::b::thing`. `use crate::a::b::thing;`
brings ONE name into local scope so you can call it unqualified. `use` only
creates a local alias — it does not change visibility. If `thing` were
private, the `use` itself would fail.
"""

[[exercises]]
name = "mod3_visibility"
path = "exercises/12_modules/mod3_visibility.rs"
mode = "test"
hint = """
`pub` is a scope you dial in:
  pub          — visible everywhere the parent is.
  pub(crate)   — visible inside this crate, not exported beyond it.
  pub(super)   — visible only to the parent module.
Struct field visibility is INDEPENDENT of the struct's visibility — `pub
struct Foo { pub a: T, b: U }` exposes `a` but keeps `b` private. That's
the encapsulation lever: private fields force outside callers through your
methods, where you can enforce invariants. The classic pattern is a getter
returning the value (Copy types) or `&` to it.
"""

[[exercises]]
name = "mod4_re_export"
path = "exercises/12_modules/mod4_re_export.rs"
mode = "test"
hint = """
`pub use crate::path::Item;` re-exports a name from the current module's
public surface — it's both a `use` (local alias) and a `pub` (export). The
FACADE pattern uses this to organise a crate by implementation internally
(`mod parser`, `mod lexer`) while exposing a curated `pub mod api` to users.
Re-exports are zero-cost — the compiler treats them as aliases, no wrapper
function generated. You can rename on re-export with `as`.
"""

[[exercises]]
name = "cargo1_dependencies"

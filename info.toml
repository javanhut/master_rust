# ===================== Chapter 8 — Option, Result & the ? operator ===========

[[exercises]]
name = "opt1_basics"
path = "exercises/08_errors/opt1_basics.rs"
mode = "test"
hint = """
Option<T> is `Some(T) | None` — Rust's `null` replacement, but type-checked.
`is_some` / `is_none` are zero-cost discriminant checks.
`unwrap()` returns the inner T or PANICS on None — fine for tests, loud in prod.
`expect("msg")` is `unwrap` with a custom panic message — strictly better.
"""

[[exercises]]
name = "opt2_match"
path = "exercises/08_errors/opt2_match.rs"
mode = "test"
hint = """
`match opt { Some(x) => ..., None => ... }` — the compiler enforces both arms.
The `Some(x)` pattern BINDS the inner value with type `T` (no unwrap needed).
Guards (`Some(n) if n > 0 => ...`) refine a pattern but don't count toward
exhaustiveness — keep a guardless fallback arm.
"""

[[exercises]]
name = "opt3_combinators"
path = "exercises/08_errors/opt3_combinators.rs"
mode = "test"
hint = """
`map` transforms the value if there is one. `unwrap_or(d)` extracts or
substitutes (eager). `unwrap_or_else(|| ...)` is the lazy form for non-trivial
defaults. `unwrap_or_default()` uses `T::default()` (0, "", empty Vec, ...).
Chains read left-to-right; each step preserves the Option shape until the
final `unwrap_or` extracts a plain T.
"""

[[exercises]]
name = "res1_basics"
path = "exercises/08_errors/res1_basics.rs"
mode = "test"
hint = """
Result<T, E> is `Ok(T) | Err(E)` — value or REASON. Return Result for expected
failures (parsing, IO); panic only for impossible states / invariant breaches.
`is_ok` / `is_err` for predicates. `.unwrap()` panics on Err and includes the
Err's Debug in the message; `.expect("msg")` adds your own context first.
"""

[[exercises]]
name = "res2_question_mark"
path = "exercises/08_errors/res2_question_mark.rs"
mode = "test"
hint = """
`expr?` desugars to `match expr { Ok(v) => v, Err(e) => return Err(From::from(e)) }`.
The function MUST return `Result<_, _>` (or Option) for `?` to compile.
Chain multiple `?` calls: the first failure short-circuits the whole expression.
Wrap the trailing success in `Ok(...)` because the function's return type is
Result, even though `?` already extracted the inner T.
"""

[[exercises]]
name = "res3_combinators"
path = "exercises/08_errors/res3_combinators.rs"
mode = "test"
hint = """
`map` transforms Ok; `map_err` transforms Err — pair `map_err` with `?` to
translate child errors at function boundaries. `and_then` chains another
fallible step. `or_else` recovers from an error. `.ok()` and `.err()` pivot
between Result and Option when you only care about one side.
"""

[[exercises]]
name = "res4_from"
path = "exercises/08_errors/res4_from.rs"
mode = "test"
hint = """
The `?` desugaring calls `From::from(err)` on the way out. Define a parent
error enum, `#[derive(Debug)]` it, and write `impl From<ChildErr> for ParentErr`
for each foreign error you want to bubble up. Then `?` lifts child errors into
the parent type automatically — adding new error categories is purely additive.
No thiserror, no `Box<dyn Error>` here — that's chapter 15.
"""

[[exercises]]
name = "errors_quiz"
path = "exercises/08_errors/errors_quiz.rs"
mode = "test"
hint = """
Capstone — parse `port=8080\\nhost=localhost`. Define a `Config` struct and a
4-variant `ConfigError` (MissingEquals, UnknownKey, BadPort wrapping
ParseIntError, Missing carrying a `&'static str`). One `impl From<ParseIntError>`
lets `value.parse::<u16>()?` work. `line.split_once('=').ok_or_else(...)?`
pivots Option->Result. Track required keys as `Option<T>` and `ok_or` them
after the loop. The whole function uses `?` — no nested matches.
"""

# ====================== Chapter 11 — Traits & generics =======================

[[exercises]]
name = "trait1_define"
path = "exercises/11_traits/trait1_define.rs"
mode = "test"
hint = """
A trait is a named set of behaviours. REQUIRED methods give only the
signature (ending in `;`) and force every implementor to fill them in.
DEFAULT methods come with a body that implementors may override or keep.
Define `Greet` with `name(&self) -> &str` required, and a defaulted
`greeting(&self) -> String` whose body is `format!("Hello, {}!", self.name())`.
Then `impl Greet for Dog { fn name(&self) -> &str { &self.name } }`.
"""

[[exercises]]
name = "trait2_impl"
path = "exercises/11_traits/trait2_impl.rs"
mode = "test"
hint = """
You write one `impl Trait for Type` block per (trait, type) pair. The
same trait can be implemented for many types, and an impl can OVERRIDE
default methods just by writing a body for them. Cat keeps the default
`greeting`; Robot overrides it. Reuse `self.name()` in the override
rather than reaching directly into struct fields.
"""

[[exercises]]
name = "trait3_derive"
path = "exercises/11_traits/trait3_derive.rs"
mode = "test"
hint = """
`#[derive(...)]` asks the compiler to generate trait impls field-by-field.
Tag must be:
  Debug          — `{:?}`
  Clone          — `.clone()`
  PartialEq + Eq — `assert_eq!`, and HashSet keys (Eq is the marker that
                   says equality is total — required by hash collections)
  Hash           — also required for HashSet membership
  Default        — `Tag::default()`
One single derive line covers all six.
"""

[[exercises]]
name = "gen1_functions"
path = "exercises/11_traits/gen1_functions.rs"
mode = "test"
hint = """
Generic functions: `fn largest<T: PartialOrd>(xs: &[T]) -> &T`. The bound
unlocks operations on T inside the body — `>` is a method on PartialOrd,
so without the bound the comparison wouldn't compile. The compiler
MONOMORPHIZES: one specialised copy of the function per concrete T at
the call sites (i32, f64, char, …). Zero runtime cost, slightly larger
binary. Prefer the WEAKEST bound that lets the body compile — PartialOrd
accepts f64 (which Ord rejects).
"""

[[exercises]]
name = "gen2_bounds"
path = "exercises/11_traits/gen2_bounds.rs"
mode = "test"
hint = """
Multiple bounds with `+`: `T: Display + Clone`. Use a `where` clause
once you have more than one bound or more than one type parameter — it
keeps signatures readable and is the style-guide recommendation. Each
type parameter gets its own row inside the where clause. `{}` is Display;
`{:?}` is Debug — pick the trait that matches your format strings.
"""

[[exercises]]
name = "gen3_structs"
path = "exercises/11_traits/gen3_structs.rs"
mode = "test"
hint = """
Generic struct: `struct Pair<T> { a: T, b: T }`. The impl block also
declares the parameter: `impl<T> Pair<T> { ... }`. CONDITIONAL impls
add a bound to the impl, not the struct: `impl<T: Display> Pair<T>` —
methods inside that block exist ONLY when T: Display. The unconditional
new/into_tuple work for any T; only `show` requires Display.
Rule of thumb: bound the impl, not the type — that keeps the struct
itself usable for non-Display types.
"""

[[exercises]]
name = "trait4_objects"
path = "exercises/11_traits/trait4_objects.rs"
mode = "test"
hint = """
A trait object `dyn Animal` is a fat pointer (data + vtable). Use it
through `Box<dyn Animal>` for owned or `&dyn Animal` for borrowed.
`Vec<Box<dyn Animal>>` is the canonical heterogeneous-collection shape:
mix Dogs, Cats, Parrots, all behind one Vec. Calls go through the vtable
(dynamic dispatch) — slightly slower per call than generics, but lets
you keep different concrete types in one collection. Static (`<T: Trait>`)
for hot loops over one type; dynamic (`dyn Trait`) for plugin-style mixes.
"""

[[exercises]]
name = "trait5_object_safety"
path = "exercises/11_traits/trait5_object_safety.rs"
mode = "compile"
hint = """
A trait is OBJECT-SAFE (i.e. usable as `dyn Trait`) only if every method
in its vtable has a pointer-shaped self (&self, &mut self, Box<Self>...),
no `Self` outside the receiver, and no generic type parameters of its
own. Methods that violate the rules can SURVIVE in the trait if you add
`where Self: Sized` — that excludes them from the vtable but keeps them
callable on concrete types. Generics on a trait method can't be rescued
that way; just remove the method (or move it to a free function that
takes `&dyn Trait`). This file is compile-mode: passing means it builds.
"""

[[exercises]]
name = "traits_quiz"
path = "exercises/11_traits/traits_quiz.rs"

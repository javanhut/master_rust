# ============== Chapter 4 — Ownership, borrowing, references ================

[[exercises]]
name = "own1_move"
path = "exercises/04_ownership/own1_move.rs"
mode = "test"
hint = """
Non-Copy types like String MOVE on assignment or function-call.
After `let s2 = s1;` or `f(s1)`, the original `s1` is invalidated.
Use `format!("Hello, {}!", name)` to build a new owned String.
`String::len()` returns the byte length.
"""

[[exercises]]
name = "own2_clone"
path = "exercises/04_ownership/own2_clone.rs"
mode = "test"
hint = """
`Copy` is implicit (i32, bool, char, …) — assignment duplicates bits for free.
`Clone` is explicit — you write `.clone()` and pay for an allocation+copy.
Every Copy type is also Clone, but NOT vice versa: String is Clone, not Copy.
For i32, just use the value twice — no clone needed.
"""

[[exercises]]
name = "own3_functions"
path = "exercises/04_ownership/own3_functions.rs"
mode = "test"
hint = """
Passing a non-Copy value into a function MOVES it. The caller can no longer use it.
To "give back" ownership, return the value: `fn f(mut s: String) -> String { ...; s }`.
String mutators take `&mut self`, so `s.push('!')` works on a `mut s: String`.
Capture the returned value with `let s = f(s);` (shadowing).
"""

[[exercises]]
name = "own4_borrow"
path = "exercises/04_ownership/own4_borrow.rs"
mode = "test"
hint = """
A shared reference `&T` lets you READ without taking ownership. You can have
many `&T` to the same value at once — they're all read-only.
`&String` parameter syntax. The dot operator auto-dereferences.
For Copy primitives behind a `&`, write `*a + *b` (or just `a + b`, which works
via `impl Add for &i32`).
"""

[[exercises]]
name = "own5_mut_borrow"
path = "exercises/04_ownership/own5_mut_borrow.rs"
mode = "test"
hint = """
`&mut T` is an EXCLUSIVE borrow — exactly one at a time, no `&T` alongside it.
Three things must align: `let mut s`, the call site `&mut s`, and the parameter
type `s: &mut T`. Then methods that take `&mut self` (like `String::push`,
`Vec::swap`) become available through the reference.
"""

[[exercises]]
name = "own6_slice"
path = "exercises/04_ownership/own6_slice.rs"
mode = "test"
hint = """
A slice is a borrowed view: pointer + length. `&str` for text, `&[T]` for arrays.
Write `&s[start..end]` to slice. Always prefer `&str` / `&[T]` as parameter types
over `&String` / `&Vec<T>` — they accept more (literals, sub-slices, arrays).
`Some((&xs[0], &xs[1..]))` for head + tail.
"""

[[exercises]]
name = "own7_dangling"
path = "exercises/04_ownership/own7_dangling.rs"
mode = "compile"
hint = """
You can't return a reference to a local — the local would be dropped before the
caller could use the reference. Rust rejects this at compile time (E0515).
The fix: change the return type to OWNED `String` and return the value itself.
Ownership transfers to the caller; nothing dangles.
"""

[[exercises]]
name = "own_quiz"
path = "exercises/04_ownership/own_quiz.rs"
mode = "test"
hint = """
Use `>=` for `longest` so ties favour `a` per the spec.
`String::push_str(&str)` appends; iterate `for p in parts` (p is `&&str` but
auto-deref handles it). `haystack.matches(needle).count()` counts non-overlapping
matches. Don't change the `<'a>` signature — lifetimes get a full chapter later.
"""

# ======================== Chapter 5 — Strings ================================

[[exercises]]
name = "str1_owned_vs_borrowed"
path = "exercises/05_strings/str1_owned_vs_borrowed.rs"
mode = "test"
hint = """
Two string types: `String` is owned and heap-allocated; `&str` is a borrowed
view into existing UTF-8 bytes. String literals like "hello" are `&'static str`.
For function parameters, prefer `&str` — it accepts both literals and `&String`
via deref coercion. Return `String` when you need to own/grow the result.
"""

[[exercises]]
name = "str2_create"
path = "exercises/05_strings/str2_create.rs"
mode = "test"
hint = """
Five spellings, one result:
  String::from("x")    — From trait, very explicit.
  "x".to_string()      — ToString trait (works on any Display).
  "x".to_owned()       — ToOwned trait (works on any borrowed type).
  "x".into()           — type-driven (target type fixes which Into is used).
  String::with_capacity(n) — empty String, buffer pre-sized for n bytes.
"""

[[exercises]]
name = "str3_concat"
path = "exercises/05_strings/str3_concat.rs"
mode = "test"
hint = """
`+` consumes the left String and borrows the right as &str:  s + &other + "!".
`format!("Hello, {name}!")` returns a String — best for interpolation.
Inside loops, `String::push_str(&str)` and `String::push(char)` are cheapest.
push takes ONE char; push_str takes a string slice.
"""

[[exercises]]
name = "str4_iterate"
path = "exercises/05_strings/str4_iterate.rs"
mode = "test"
hint = """
UTF-8 is variable-width, so `s[0]` is forbidden — pick what you mean:
  s.len()           — length in BYTES (O(1)).
  s.chars()         — iterator of Unicode scalar `char`s.
  s.chars().count() — number of chars (linear scan).
  s.char_indices()  — (byte_offset, char) pairs — use .nth(n) to find offsets.
"""

[[exercises]]
name = "str5_split_join"
path = "exercises/05_strings/str5_split_join.rs"
mode = "test"
hint = """
Splitters: split(','), splitn, split_whitespace, lines.
`split_whitespace` collapses runs and drops empty edges — prefer it for words.
`lines()` handles both \\n and \\r\\n.
The idiom for transform-and-rejoin:
    s.split(',').map(|p| f(p)).collect::<Vec<_>>().join(",")
"""

[[exercises]]
name = "str6_parse"
path = "exercises/05_strings/str6_parse.rs"
mode = "test"
hint = """
`s.parse::<T>()` returns `Result<T, _>` — you must annotate the target type
either via the binding (`let n: i32 = ...`) or with the turbofish.
Use `.unwrap()` for happy-path / tests, `.unwrap_or(0)` for a default on Err.
Always `.trim()` untrusted input BEFORE parsing — leading whitespace fails.
Real error handling (?, custom errors) lands in chapter 8.
"""

[[exercises]]
name = "str_quiz"
path = "exercises/05_strings/str_quiz.rs"
mode = "test"
hint = """
Capstone — combine split_whitespace, to_lowercase, lines, collect, reverse, join.
For uniqueness without HashSet (later chapter), use a Vec<String> + .contains.
For reversing lines: collect lines into a Vec<&str>, .reverse(), then .join("\\n")
so the result has separators BETWEEN lines but no trailing newline.
"""

# ===================== Chapter 6 — Collections: Vec & HashMap ================

[[exercises]]
name = "vec1_create"
path = "exercises/06_collections/vec1_create.rs"
mode = "test"
hint = """
Three ways to build a Vec:
  Vec::new()                — empty, no allocation yet.
  vec![1, 2, 3]             — macro for literal contents.
  Vec::with_capacity(n)     — empty but pre-allocated for n elements.
Capacity is NOT length. `Vec::with_capacity(10).len()` is 0.
"""

[[exercises]]
name = "vec2_index_get"
path = "exercises/06_collections/vec2_index_get.rs"
mode = "test"
hint = """
v[i] panics if i is out of bounds. v.get(i) returns Option<&T> and never panics.
Use `.copied()` to turn Option<&T> into Option<T> when T: Copy.
Prefer `is_empty()` over `len() == 0`.
"""

[[exercises]]
name = "vec3_mutate"
path = "exercises/06_collections/vec3_mutate.rs"
mode = "test"
hint = """
push/pop are O(1) at the end. insert/remove in the middle are O(n) — every
later element shifts. swap_remove(i) is O(1) but DOESN'T preserve order.
retain(|x| ...) drops elements that don't match the predicate, in place.
"""

[[exercises]]
name = "vec4_iterate"
path = "exercises/06_collections/vec4_iterate.rs"
mode = "test"
hint = """
Three flavours of iteration:
  for x in &v       — x: &T   (read-only)
  for x in &mut v   — x: &mut T (mutate in place; assign with *x = ...)
  for x in v        — x: T     (consumes the Vec)
The pattern `for &x in &v` destructures the reference so x: T directly.
"""

[[exercises]]
name = "vec5_slicing"
path = "exercises/06_collections/vec5_slicing.rs"
mode = "test"
hint = """
&v[a..b] is a slice — a borrowed (pointer, length) view, no allocation.
v.first() / v.last() return Option<&T>. v.chunks(n) yields fixed-size
sub-slices (last one may be shorter). While the slice exists you can't push.
"""

[[exercises]]
name = "map1_create"
path = "exercises/06_collections/map1_create.rs"
mode = "test"
hint = """
HashMap is not in the prelude — `use std::collections::HashMap;`.
Insert returns Option<V> (the previous value, if any). get/contains_key/remove
take a reference to the key. A HashMap<String, _> accepts &str on lookup
thanks to the Borrow trait — no clone needed to ask "is this key here?".
"""

[[exercises]]
name = "map2_entry"
path = "exercises/06_collections/map2_entry.rs"
mode = "test"
hint = """
The canonical Rust counter pattern:
  *m.entry(key).or_insert(0) += 1;
One hash lookup, not two. Use `or_insert_with(|| ...)` when the default
itself is expensive — the closure only runs if the key was missing.
"""

[[exercises]]
name = "collections_quiz"
path = "exercises/06_collections/collections_quiz.rs"
mode = "test"
hint = """
Capstone — combine everything. Use `text.split_whitespace()` to tokenise
(it collapses runs of any whitespace), then the `*entry(...).or_insert(0) += 1`
pattern to count. To find the max, walk `&map` once with a running best.
Iterator chains like `max_by_key` arrive in chapter 7.
"""

# ===================== Chapter 9 — Structs & methods =========================

[[exercises]]
name = "struct1_define"
path = "exercises/09_structs/struct1_define.rs"
mode = "test"
hint = """
A named-field struct: `struct Point { x: i32, y: i32 }`.
Build instances with `Point { x: 3, y: 4 }`. When a local variable shares a
field's name, use field-init shorthand: `Point { x, y }` instead of `x: x`.
Access fields with `.x` / `.y`. `i32` has an `.abs()` method.
"""

[[exercises]]
name = "struct2_tuple"
path = "exercises/09_structs/struct2_tuple.rs"
mode = "test"
hint = """
Tuple structs have positional fields: `struct UserId(u64);`.
The newtype pattern wraps a primitive in its own type so the compiler can
tell `UserId` from `OrderId`. Reach inside with `.0`, wrap back with
`OrderId(value)`. Bitwise XOR is `^`.
"""

[[exercises]]
name = "struct3_unit"
path = "exercises/09_structs/struct3_unit.rs"
mode = "test"
hint = """
A unit struct has no fields: `struct English;`. It exists so traits can be
implemented on it as a marker. `std::mem::size_of::<English>()` is `0` —
unit structs occupy zero bytes. Inside an `impl Greet for English` block,
`self` is just `&English`; return a `&'static str` literal.
"""

[[exercises]]
name = "struct4_impl"
path = "exercises/09_structs/struct4_impl.rs"
mode = "test"
hint = """
Three receivers:
  &self      — read-only borrow (most common).
  &mut self  — exclusive borrow that mutates fields.
  self       — takes ownership; the value is moved INTO the method.
You need `let mut c = ...` to call `&mut self` methods. Calling a `self`
method consumes the binding — you cannot use it afterwards.
"""

[[exercises]]
name = "struct5_associated"
path = "exercises/09_structs/struct5_associated.rs"
mode = "test"
hint = """
Associated functions live in `impl` but take no `self`. Call them with
`Counter::new()`. Inside the impl, use `Self` (capital S) instead of the
type name — it's an alias and survives renames. Have other constructors
delegate to `Self::new()` rather than duplicating the literal.
"""

[[exercises]]
name = "struct6_update"
path = "exercises/09_structs/struct6_update.rs"
mode = "test"
hint = """
`Foo { x: 1, ..other }` means "x from the literal, every other field from
`other`". The `..other` MUST come last. Combine with field-init shorthand:
`Config { title, ..base }`. `..base` MOVES non-Copy fields out of `base`,
which is exactly what you want when the function consumes `base` by value.
"""

[[exercises]]
name = "struct_quiz"
path = "exercises/09_structs/struct_quiz.rs"
mode = "test"
hint = """
Capstone for chapter 9: `Rectangle { width, height }` with `area`,
`perimeter`, `contains(&self, other: &Rectangle) -> bool`, and an
associated `Self::square(side)`. Have `square` delegate to `Self::new`.
`contains` uses `>=` (an equal-sized rectangle fits exactly).
"""

# ===================== Chapter 10 — Enums & pattern matching =================

[[exercises]]
name = "enum1_define"
path = "exercises/10_enums/enum1_define.rs"
mode = "test"
hint = """
An enum is "exactly one of these alternatives". Three variant flavours:
  - unit:        Foo
  - tuple:       Foo(T)
  - named-field: Foo { x: T, y: U }
Mix them in one enum. Construct with `Shape::Circle(2.0)` or
`Shape::Rectangle { w: 3.0, h: 4.0 }`. Match arms destructure the payload.
"""

[[exercises]]
name = "enum2_match"
path = "exercises/10_enums/enum2_match.rs"
mode = "test"
hint = """
`match` on an enum must cover EVERY variant — that's exhaustiveness, the
big win. Use `_` as a wildcard for "everything else", but sparingly on
enums you own (it disables the new-variant warning).
The match itself is an expression: `let x = match v { ... };`.
"""

[[exercises]]
name = "enum3_methods"
path = "exercises/10_enums/enum3_methods.rs"
mode = "test"
hint = """
Enums get methods via `impl Light { fn next(&self) -> Light { match self { ... } } }`.
`&self` is a read-only borrow. Inside, `match self` matches on the variant.
For "is this exactly variant X?" reach for `matches!(self, Light::Green)`.
"""

[[exercises]]
name = "match1_patterns"
path = "exercises/10_enums/match1_patterns.rs"
mode = "test"
hint = """
Pattern toolkit:
  `1 | 2 | 3`     — alternatives ("or-patterns")
  `1..=9`         — inclusive range pattern
  `x @ 1..=9`     — match the range AND bind the value to `x`
Arms are tried top-to-bottom; order matters when patterns overlap.
"""

[[exercises]]
name = "match2_destructure"
path = "exercises/10_enums/match2_destructure.rs"
mode = "test"
hint = """
Patterns work on any composite value. Tuple: `(0, 0)`, `(_, 0)`, `(x, y)`.
Struct: `Point { x: 0, y: 0 }`, `Point { x, y: 0 }`. Use `_` to ignore a
field and `..` to ignore the rest. Patterns nest freely.
"""

[[exercises]]
name = "match3_guards"
path = "exercises/10_enums/match3_guards.rs"
mode = "test"
hint = """
A guard is `if cond` after the pattern: `Some(x) if x > 0 => ...`.
Use guards when the decision depends on the VALUE, not just the shape.
Guards do NOT count toward exhaustiveness — you'll need a guardless
fallback arm to cover the remaining cases.
"""

[[exercises]]
name = "match4_iflet_whilelet"
path = "exercises/10_enums/match4_iflet_whilelet.rs"
mode = "test"
hint = """
Lighter alternatives to `match`:
  `if let Some(x) = opt { ... } else { ... }`   — one pattern of interest.
  `let Ok(n) = parse() else { return 0; };`    — extract or bail (else
                                                  block must diverge).
  `while let Some(x) = v.pop() { ... }`         — loop while pattern fits.
"""

[[exercises]]
name = "enum_quiz"
path = "exercises/10_enums/enum_quiz.rs"
mode = "test"
hint = """
Capstone: a vending machine state machine. `VendingMachine::Idle`,
`Selected(Drink)`, `Dispensing`. Transitions take `self` and return the
next state — invalid transitions return `other => other` unchanged.
`current_drink` returns `Some(d)` only in `Selected`. Derive `Copy` and
`PartialEq` on both enums so the tests can compare states cheaply.
"""

# ====================== Chapter 16 — Closures & function traits ===============

[[exercises]]
name = "closure1_basics"
path = "exercises/16_closures/closure1_basics.rs"
mode = "test"
hint = """
Closure syntax: `|x| x + 1`. Parameter and return types are inferred from
the first call. Closures CAPTURE names from the surrounding scope —
by reference if reading, by mutable reference if mutating, by value if
the body moves the captured value out. Use `move` to FORCE capture by
value (needed when the closure outlives its scope, e.g. when returned).
"""

[[exercises]]
name = "closure2_traits"
path = "exercises/16_closures/closure2_traits.rs"
mode = "test"
hint = """
Three closure traits, ordered most-to-least permissive bound:
  Fn      — read-only captures, callable through &F.
  FnMut   — may mutate captures, callable through &mut F.
  FnOnce  — may consume captures, callable exactly once (consumes F).
Hierarchy: every Fn is FnMut is FnOnce. As a function author, pick the
WEAKEST bound that does the job — that lets callers pass the most.
"""

[[exercises]]
name = "closure3_returning"
path = "exercises/16_closures/closure3_returning.rs"
mode = "test"
hint = """
Returning a closure: `-> impl Fn(i32) -> i32` for static dispatch (one
concrete closure type, zero overhead). Use `Box<dyn Fn(i32) -> i32>` when
different branches return DIFFERENT closure types — `impl Trait` can only
be one concrete type, but `dyn` erases the type behind a vtable.

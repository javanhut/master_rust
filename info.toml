A reading exercise. Skim the long teaching block: it covers Cargo.toml
layout (`[package]`, `[dependencies]`, `[dev-dependencies]`), semver
requirements (`"1.0"` means ">=1.0.0, <2.0.0"; `"0.x"` minor bumps are
breaking), features (`{ version = "1", features = ["derive"] }`), and the
key commands — `cargo new`, `cargo add`, `cargo build`, `cargo test`,
`cargo check`, `cargo doc`. Once you've read it, just delete the
`// I AM NOT DONE` line — the code itself is trivial.
"""

[[exercises]]
name = "modules_quiz"
path = "exercises/12_modules/modules_quiz.rs"
mode = "test"

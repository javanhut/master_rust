# ===================== Chapter 13 — Smart pointers ===========================

[[exercises]]
name = "box1_basics"
path = "exercises/13_smart_pointers/box1_basics.rs"
mode = "test"
hint = """
`Box<T>` heap-allocates a single `T` and owns it. Build with `Box::new(x)`,
read through `*b` (T must be Copy or you'll be moving). The classic motivation
is recursive types: `enum List { Cons(i32, Box<List>), Nil }` — without the
Box, the size is infinite. `&Box<T>` deref-coerces to `&T` so methods that
expect a reference Just Work.
"""

[[exercises]]
name = "box2_dyn"
path = "exercises/13_smart_pointers/box2_dyn.rs"
mode = "test"
hint = """
`Box<dyn Trait>` is the OWNED trait object — a fat (data, vtable) pointer
that lets you store heterogeneous concrete types in one collection:
`Vec<Box<dyn Animal>>`. The compiler unsizes `Box<Dog>` -> `Box<dyn Animal>`
implicitly at the assignment site. Calls go through the vtable (dynamic
dispatch); for hot loops prefer `impl Trait` for static dispatch instead.
"""

[[exercises]]
name = "rc1_basics"
path = "exercises/13_smart_pointers/rc1_basics.rs"
mode = "test"
hint = """
`Rc<T>` = reference-counted shared ownership, single-threaded. `Rc::clone(&rc)`
bumps the strong count (cheap — no T copy); drop decrements; allocation frees
when the count hits 0. Inspect with `Rc::strong_count(&rc)`. `Rc::ptr_eq` to
test "same allocation". To deep-clone the inner T, call `T::clone` explicitly
— `rc.clone()` resolves to `Rc::clone`. NOT `Send` — for threads use `Arc`.
"""

[[exercises]]
name = "refcell1_basics"
path = "exercises/13_smart_pointers/refcell1_basics.rs"
mode = "test"
hint = """
`RefCell<T>` moves the borrow checker to RUNTIME. `borrow()` returns `Ref<T>`
(many at once allowed); `borrow_mut()` returns `RefMut<T>` (exclusive). Two
overlapping `borrow_mut`s PANIC. Use `try_borrow_mut()` for a non-panicking
probe. Single-threaded only (`!Sync`); for threads use `Mutex`. Hold guards
briefly — drop them as soon as the read/write is done.
"""

[[exercises]]
name = "rc_refcell"
path = "exercises/13_smart_pointers/rc_refcell.rs"
mode = "test"
hint = """
`Rc<RefCell<T>>` is the canonical "many owners that all can mutate" pattern.
Each owner stores its own `Rc`; mutation goes `*rc.borrow_mut() += 1`, which
auto-derefs the Rc to the RefCell, takes the runtime mutable borrow, and
mutates. Construct with `Rc::new(RefCell::new(value))` and pass clones into
each owner: `Bumper::new(Rc::clone(&shared))`. Strong count tracks owners.
"""

[[exercises]]
name = "arc1_basics"
path = "exercises/13_smart_pointers/arc1_basics.rs"
mode = "test"
hint = """
`Arc<T>` = `Rc<T>` with an ATOMIC counter — `Send + Sync` and safe to share
across threads. Same API: `Arc::new`, `Arc::clone(&a)`, `Arc::strong_count`,
`Arc::ptr_eq`. Pick `Rc` for single-threaded code (slightly cheaper) and
`Arc` whenever threads are involved. For thread-safe MUTATION pair with
`Mutex<T>` -> `Arc<Mutex<T>>`; full concurrency story is chapter 14.
"""

[[exercises]]
name = "smart_quiz"
path = "exercises/13_smart_pointers/smart_quiz.rs"
mode = "test"
hint = """
Capstone: a tree where children are `Vec<Rc<RefCell<Node>>>` (owning,
mutable) and parent is `Weak<RefCell<Node>>` to break the Rc cycle.
`Rc::downgrade(rc)` makes a `Weak`; `weak.upgrade()` returns `Option<Rc>`
(`None` once the parent is dropped). Wrap the parent FIELD in `RefCell` so
you can set it after construction. This is THE shape for any safe-Rust
tree/graph; arenas (Vec + indices) are the perf-oriented alternative.
"""

# ===================== Chapter 17 — Lifetimes deep-dive ======================

[[exercises]]
name = "lt1_intro"
path = "exercises/17_lifetimes/lt1_intro.rs"
mode = "compile"
hint = """
A lifetime is a REGION OF CODE — a scope — not a duration in seconds. The
borrow checker proves that every reference is used only inside the scope
its referent is alive. The fix here is structural: pull `s` up into the
outer scope so it lives at least as long as the reference into it.
No `'a` annotation is needed; just give the value a long enough scope.
"""

[[exercises]]
name = "lt2_function"
path = "exercises/17_lifetimes/lt2_function.rs"
mode = "test"
hint = """
`fn longer_of<'a>(a: &'a str, b: &'a str) -> &'a str` — read as "for some
region 'a, both inputs are valid for at least 'a and the output is valid
for exactly 'a." Annotations don't affect runtime; they only let the
compiler check the constraint. With two input refs and an output ref,
elision can't pick — you must spell out the shared `'a`.
"""

[[exercises]]
name = "lt3_elision"
path = "exercises/17_lifetimes/lt3_elision.rs"
mode = "compile"
hint = """
The three elision rules:
  1. Each input ref gets its own fresh lifetime.
  2. If there's exactly ONE input ref, the output gets that lifetime.
  3. If `&self`/`&mut self` is present, the output gets self's lifetime.
When elision can't fill in an output ref's lifetime (e.g., two input refs,
no &self), either annotate explicitly or sidestep by returning an OWNED
value like `String`.
"""

[[exercises]]
name = "lt4_struct"
path = "exercises/17_lifetimes/lt4_struct.rs"
mode = "test"
hint = """
A struct that holds a reference is parameterized by the reference's
lifetime: `struct Excerpt<'a> { part: &'a str }`. Such a struct cannot
outlive the data it borrows — the compiler enforces that. Repeat the
parameter in the impl block: `impl<'a> Excerpt<'a> { ... }`. Inside
methods, Rule 3 elision usually saves you from writing `'a` again.
"""

[[exercises]]
name = "lt5_static"
path = "exercises/17_lifetimes/lt5_static.rs"
mode = "test"
hint = """
`'static` means "lives for the whole program." String literals are
`&'static str` — they live in the binary's read-only data. Not every
`&str` you can name is `'static`: a slice of a runtime-allocated `String`
is NOT `'static`. The bound `T: 'static` is different — it means "T
contains no borrows shorter than 'static." Owned types like `String`,
`i32`, and `Vec<u8>` satisfy `T: 'static` trivially.
"""

[[exercises]]
name = "lt6_subtyping"
path = "exercises/17_lifetimes/lt6_subtyping.rs"
mode = "test"
hint = """
A reference that lives LONGER can stand in where a SHORTER one is needed
— that's covariance in the lifetime parameter. So a `&'static str`
(literal) works fine where any old `&str` is expected. The reverse never
works: you can't pass a short-lived ref where a longer one is required.
A function taking `Fn(&str)` accepts callbacks regardless of input
lifetime — under the hood it's `for<'a> Fn(&'a str)`.
"""

[[exercises]]
name = "lifetimes_quiz"
path = "exercises/17_lifetimes/lifetimes_quiz.rs"
mode = "test"
hint = """
Capstone: `Parser<'a>` holds a slice of input plus a byte cursor.
`peek` and `advance` return `Option<char>`; advance by `c.len_utf8()`,
not by 1, so multibyte UTF-8 doesn't desync the cursor.
The KEY signature is `take_while<P>(&mut self, pred: P) -> &'a str` —
NOT `&str`. The explicit `'a` overrides Rule 3 elision so the result
borrows from the original input, not from `&self`. That lets the slice
outlive the parser itself.
"""
# ====================== Chapter 14 — Concurrency =============================

[[exercises]]
name = "thread1_spawn"
path = "exercises/14_concurrency/thread1_spawn.rs"
mode = "test"
hint = """
`thread::spawn(|| ...)` returns a `JoinHandle<T>`; `handle.join().unwrap()`
waits for the thread and unwraps its result (panicking if the thread did).
The closure must be `Send + 'static` — write `move ||` to capture by value
so the closure owns everything it touches and can outlive the spawning frame.
"""

[[exercises]]
name = "thread2_move"
path = "exercises/14_concurrency/thread2_move.rs"
mode = "test"
hint = """
Without `move`, a closure captures by reference — and a borrow into the
spawning frame can't satisfy `'static`, so `thread::spawn` rejects it.
`move ||` switches every capture to BY-VALUE: the Vec / String travels
into the new thread, the spawner can no longer use it. One owner, one
thread — that's the rule.
"""

[[exercises]]
name = "chan1_mpsc"
path = "exercises/14_concurrency/chan1_mpsc.rs"
mode = "test"
hint = """
`mpsc::channel()` returns `(Sender, Receiver)`. `tx.send(v)` is non-blocking
on the unbounded variant; `rx.recv()` BLOCKS until a value arrives or every
Sender has been dropped (then it returns `Err(RecvError)` — the canonical
"channel closed" signal). Drop the only sender to test that closure.
"""

[[exercises]]
name = "chan2_iter"
path = "exercises/14_concurrency/chan2_iter.rs"
mode = "test"
hint = """
`for msg in rx { ... }` is the idiomatic drain — the receiver is itself an
iterator that ends when the channel closes. `Sender` is `Clone`, so each
producer thread takes its own clone via `tx.clone()`. Don't forget to
`drop(tx)` on the original sender, or the loop will wait forever for a
sender that never dies.
"""

[[exercises]]
name = "mutex1_basics"
path = "exercises/14_concurrency/mutex1_basics.rs"
mode = "test"
hint = """
`Mutex::new(v)` wraps a value; `m.lock().unwrap()` blocks until the lock is
free, then returns a `MutexGuard` that derefs to `&mut T`. The guard's
Drop releases the lock — there is no `unlock()` method. Hold the lock for
the SHORTEST useful window. `.unwrap()` panics on a poisoned mutex (the
previous holder panicked); fine for tests.
"""

[[exercises]]
name = "arc_mutex"
path = "exercises/14_concurrency/arc_mutex.rs"
mode = "test"
hint = """
`Arc<Mutex<T>>` is THE shared-mutable-state pattern. Build it once with
`Arc::new(Mutex::new(...))`, then `Arc::clone(&counter)` per worker
thread — cloning the Arc only bumps the atomic refcount, the Mutex stays
put. Each worker locks, mutates, drops the guard. Join everyone before
you read the final value through one last lock.
"""

[[exercises]]
name = "send_sync"
path = "exercises/14_concurrency/send_sync.rs"
mode = "compile"
hint = """
`Send` = "movable to another thread"; `Sync` = "shareable as `&T` across
threads" (equivalently, `&T: Send`). Both are auto-traits — the compiler
implements them for you. `Rc<T>` is `!Send` (non-atomic refcount, would
race); `Arc<T>` is `Send + Sync`. The fix here is two edits: the import
(`std::rc::Rc` -> `std::sync::Arc`) and the constructor.
"""

[[exercises]]
name = "concurrency_quiz"
path = "exercises/14_concurrency/concurrency_quiz.rs"
mode = "test"
hint = """
Capstone: a fixed-size thread pool with two channels — jobs (main->workers)
and results (workers->main). `Receiver` isn't `Clone`, so wrap the jobs
side in `Arc<Mutex<Receiver>>` and have each worker take the lock just
long enough to grab one job. Drop the original `jobs_tx` and `results_tx`
in main so each channel can close once its producers exit. Sum the
per-line word counts as they arrive — `split_whitespace().count()` is
the right per-line counter.
"""

# ===================== Chapter 15 — Errors at scale ==========================

[[exercises]]
name = "err1_custom_enum"
path = "exercises/15_errors_at_scale/err1_custom_enum.rs"
mode = "test"
hint = """
Define a domain `enum MyError` with three variants: `NotFound` (unit),
`Invalid(String)`, and `Io(std::io::Error)`. `#[derive(Debug)]` is mandatory
— `unwrap`, `assert_eq!`, and `?`-in-tests all print errors via Debug.
We're not using `?` yet, so manually wrap io errors with
`Err(MyError::Io(e))` in the `Err` arm. Each variant names a category your
caller will distinguish; carry the structured cause, never stringify it.
"""

[[exercises]]
name = "err2_display_error"
path = "exercises/15_errors_at_scale/err2_display_error.rs"
mode = "test"
hint = """
A first-class error implements TWO traits beyond Debug: `std::fmt::Display`
(human text) and `std::error::Error` (the marker, with default `source()`).
The Display impl is one `match` with `write!(f, "...")` per arm — `write!`
itself returns `fmt::Result`, no `?`/`Ok(())` needed. The empty
`impl std::error::Error for MyError {}` is the smallest legal impl;
chapter 8's review of the `?`-`From::from` desugaring still applies.
"""

[[exercises]]
name = "err3_from_chain"
path = "exercises/15_errors_at_scale/err3_from_chain.rs"
mode = "test"
hint = """
Add a `Parse(ParseIntError)` variant + `impl From<ParseIntError> for MyError`
so a single `?` lifts parser errors into the enum (chapter 8 res4 territory,
extended). Override `Error::source()` to expose wrapped variants — return
`Some(e)` for `Io(e)` / `Parse(e)`, `None` for variants that originate the
failure here. The `dyn std::error::Error + 'static` return type is verbatim.
The function body is one `?` plus a domain check plus a `match`.
"""

[[exercises]]
name = "err4_thiserror"
path = "exercises/15_errors_at_scale/err4_thiserror.rs"
mode = "test"
hint = """
Imitate `#[derive(thiserror::Error)]` BY HAND. The macro turns
`#[error("...")]` attributes into Display match arms and `#[from]` into a
`From` impl plus a `source()` wiring. The runner has no Cargo, so we write
the four impls (Debug derive, Display, Error+source, From) ourselves —
exactly what the macro emits. In a real crate `cargo add thiserror` and
those ~50 lines collapse to ~10. The function bodies don't change.
"""

[[exercises]]
name = "err5_anyhow"
path = "exercises/15_errors_at_scale/err5_anyhow.rs"
mode = "test"
hint = """
`anyhow::Error` is essentially `Box<dyn Error + Send + Sync + 'static>`.
The blanket `From<E> for Box<dyn Error+...>` lets `?` swallow ANY concrete
error — no hand-written From impls. Define `type DynError = Box<...>` and
`type Result<T> = std::result::Result<T, DynError>`. Build a tiny `Errored`
wrapper + `Context` extension trait so `.with_context(|| msg)?` adds a
chained layer. `e.downcast_ref::<io::Error>()` recovers the concrete type.
Use this pattern in BINARIES; thiserror in libraries.
"""

[[exercises]]
name = "errors_quiz_at_scale"
path = "exercises/15_errors_at_scale/errors_quiz.rs"
mode = "test"
hint = """
Capstone: `parse_user_command` for `get/set/delete/count`. Build a 5-variant
`MyError` (Empty, UnknownVerb(String), MissingArg(&'static str),
BadCount(ParseIntError), Trailing(String)) with hand-written Display +
Error + `source()` + `From<ParseIntError>` — exactly the err1–err4 toolkit.
`split_whitespace` collapses runs; `.ok_or(MyError::MissingArg(role))?` for
absent tokens; `?` lifts the count parse via your From impl. Check leftover
tokens AFTER taking required args to detect Trailing input.
"""

# ====================== Chapter 18 — Async / await ===========================

[[exercises]]
name = "async1_intro"
path = "exercises/18_async/async1_intro.rs"
mode = "test"
hint = """
`async fn foo() -> T` desugars to `fn foo() -> impl Future<Output = T>`.
Calling an async fn does NOT run the body — futures are LAZY. They sit
as paused state machines until something polls them. `.await` is the
suspension point: poll the inner future, return its value, or pause
this future too. The bridge from sync `main` to async is an executor
— here, the hand-rolled `runtime::block_on` at the bottom of the file.
"""

[[exercises]]
name = "async2_runtime"
path = "exercises/18_async/async2_runtime.rs"
mode = "test"
hint = """
The executor's job: build a Waker (no-op here), pin the future, then
loop calling `poll`. Ready returns the value; Pending means "park me
and call back when you're notified." Real runtimes park the OS thread;
we spin because every Pending in this chapter resolves on the next
poll. Read `mod runtime` — it's the smallest complete executor for
single-future programs, and it's what `#[tokio::main]` is hiding.
"""

[[exercises]]
name = "async3_join"
path = "exercises/18_async/async3_join.rs"
mode = "test"
hint = """
`runtime::join2(a, b).await` polls BOTH children on each round and
returns the pair when both are Ready. That's CONCURRENCY (both alive,
interleaved polls) not necessarily PARALLELISM (different threads).
Compare the sequential form `let a = .await; let b = .await;` — total
time is the SUM of the two latencies. With join, total ≈ MAX. The
real-world spelling is `tokio::join!(fa, fb)` or `futures::future::join`.
"""

[[exercises]]
name = "async4_select"
path = "exercises/18_async/async4_select.rs"
mode = "test"
hint = """
`select2(a, b)` returns whichever finishes first as `Either<A, B>`.
The losing future is DROPPED — that's how async cancellation works in
Rust: stop polling, drop the future, every Drop impl on the way down
cleans up its resources. There is no kill syscall. Use `select` for
timeouts (`select(work, timer)`), shutdown (`select(server, signal)`),
or first-of-N replicated requests. tokio's macro is `tokio::select!`.
"""

[[exercises]]
name = "async5_spawn"
path = "exercises/18_async/async5_spawn.rs"
mode = "test"
hint = """
`spawn(fut)` pushes a future onto a task queue and returns. The
executor polls all queued tasks, retiring those that go Ready and
re-queueing those still Pending — this is how a single thread runs
many concurrent tasks. Spawned futures must be `'static` and have
`Output = ()`; communicate results back through shared state
(`Rc<Cell<T>>` here, `Arc<Mutex<T>>` or channels in real code).
"""

[[exercises]]
name = "async6_send"
path = "exercises/18_async/async6_send.rs"
mode = "compile"
hint = """
Multi-threaded executors load-balance tasks across threads, so
`tokio::spawn` requires `F: Future + Send + 'static`. A future is
non-Send when it captures a non-Send value across an `.await` (the
classic example: `Rc<T>`). The fix is usually a one-line type swap:
`Rc -> Arc`, `RefCell -> Mutex`, `Cell -> Atomic*`. Or drop the value
BEFORE the await so it never enters the state machine.
"""

[[exercises]]
name = "async7_streams"
path = "exercises/18_async/async7_streams.rs"
mode = "test"
hint = """
A `Stream` is the async sibling of `Iterator`: `poll_next` returns
`Poll<Option<Item>>`. The consumer idiom is
`while let Some(x) = s.next().await { ... }` — direct translation of
`for x in iter`. Provided here: a `CounterStream` that yields 1..=n
with a Pending between each item, plus a `StreamExt::next()` adapter
so the await syntax works. In real code use `futures::Stream` or
`tokio_stream`.
"""

[[exercises]]
name = "async_quiz"
path = "exercises/18_async/async_quiz.rs"
mode = "test"
hint = """
Capstone: three async "fetches" run concurrently via `join_all`. Each
async fn produces a UNIQUE anonymous future type, so to put them in
one Vec you erase via `Pin<Box<dyn Future<Output = T>>>` (aliased as
`BoxFuture<T>`). `join_all` polls every child until all are Ready and
returns the outputs in submission order. Real code: `tokio::join!` for
fixed arity, `futures::future::join_all` for dynamic.
"""

# ====================== Chapter 19 — Macros ==================================

[[exercises]]
name = "macro1_println"
path = "exercises/19_macros/macro1_println.rs"
mode = "compile"
hint = """
A reading exercise — what `println!` actually IS. The trailing `!` means
macro, not function. `println!` cannot be a function because it needs:
variable arity, heterogeneous argument types, and compile-time validation
of the format string literal. All `print!`/`println!`/`format!`/`write!`
ultimately delegate to `format_args!`, which builds a `core::fmt::Arguments`.
The format string MUST be a string literal — the macro tokenises it at
expansion time. Once the comments click, just delete `// I AM NOT DONE`.
"""

[[exercises]]
name = "macro2_macro_rules"
path = "exercises/19_macros/macro2_macro_rules.rs"
mode = "test"
hint = """
`macro_rules! NAME { (PATTERN) => { EXPANSION }; }`. Capture chunks of
input with `$name:KIND` — the most useful KINDs are `expr`, `ident`, `ty`,
`tt`, `block`. Refer to a captured chunk in the expansion as `$name`. For
`square!`, use `$x:expr` and wrap the EXPANSION in parentheses so
`square!(2 + 3)` becomes `((2 + 3) * (2 + 3)) == 25`, not 11. For
`say_hello!`, the empty pattern `()` matches no input.
"""

[[exercises]]
name = "macro3_repetition"
path = "exercises/19_macros/macro3_repetition.rs"
mode = "test"
hint = """
Repetition shape: `$( PATTERN )SEP REPEATER`. `*` is zero-or-more, `+` is
one-or-more, `?` is zero-or-one (no separator). Mirror the SAME shape on
the expansion side. The HEAD/TAIL trick — `$head:expr $(, $tail:expr )*`
expanding to `$head $( .min($tail) )*` — gives a clean reduction:
one element produces zero `.min` calls, N elements produce N-1.
"""

[[exercises]]
name = "macro4_hygiene"
path = "exercises/19_macros/macro4_hygiene.rs"
mode = "test"
hint = """
Hygiene means identifiers introduced INSIDE a `macro_rules!` body live in
the macro's own scope, separate from the caller's. So `let _tmp = $x;`
inside the macro does NOT shadow a caller-side `_tmp`. Captured fragments
like `$x` keep the caller's scope, so `$x` resolves names in the caller.
Use a block expression `{{ ... }}` so the expansion yields a value. C's
textual macros can't promise this — Rust's can.
"""

[[exercises]]
name = "macro5_proc_taste"
path = "exercises/19_macros/macro5_proc_taste.rs"
mode = "compile"
hint = """
A reading exercise on procedural macros. The pipeline:
TokenStream → proc_macro2::TokenStream → syn AST (DeriveInput) →
inspection → `quote! { ... }` → TokenStream → spliced back in. Three
flavours: derive (`#[derive(Debug)]`), attribute (`#[tokio::main]`), and
function-like (`sqlx::query!`). They live in a separate `proc-macro = true`
crate. We can't ship one in this single-file sandbox; the comments walk
through what `#[derive(Debug)]` expands to. Run `cargo expand` on a real
project to see expansions for yourself.
"""

[[exercises]]
name = "macros_quiz"
path = "exercises/19_macros/macros_quiz.rs"
mode = "test"
hint = """
Capstone: a `hashmap!{ "a" => 1, "b" => 2 }` literal macro. Pattern is
`( $( $k:expr => $v:expr ),* $(,)? )` — comma-separated key/value pairs
with an optional trailing comma. Expansion is a block that builds a
`HashMap`, inserts each pair, and yields the map. Use the absolute path
`::std::collections::HashMap` so the macro works in any module without
requiring callers to `use HashMap;` first. Hygiene keeps the internal
`let mut m = ...` from clashing with anything at the call site.
"""

